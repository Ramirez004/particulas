<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Sofi - Partículas Interactivas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #video-container { position: fixed; bottom: 10px; right: 10px; width: 150px; border: 2px solid white; border-radius: 10px; overflow: hidden; z-index: 10; }
        #video-container video { width: 100%; transform: scaleX(-1); }
        .instrucciones { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>

<div class="instrucciones">
    <p>✌️ 2 dedos: "Te amo Sofi"</p>
    <p>🖐️ Mano abierta: Corazón 3D</p>
    <p>👌 Pellizco: Agrandar partículas</p>
</div>

<div id="video-container">
    <video id="input_video"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const videoElement = document.getElementById('input_video');
let scene, camera, renderer, particles, heartMesh;
let mode = 'normal'; // normal, text, heart

// --- CONFIGURACIÓN THREE.JS ---
function initThree() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Crear sistema de partículas básico
    const geo = new THREE.BufferGeometry();
    const count = 5000;
    const pos = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) pos[i] = (Math.random() - 0.5) * 10;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    const mat = new THREE.PointsMaterial({ color: 0xff44aa, size: 0.05 });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);

    // Crear Corazón 3D (oculto al inicio)
    const x = 0, y = 0;
    const heartShape = new THREE.Shape();
    heartShape.moveTo( x + 0.5, y + 0.5 );
    heartShape.bezierCurveTo( x + 0.5, y + 0.5, x + 0.4, y, x, y );
    heartShape.bezierCurveTo( x - 0.6, y, x - 0.6, y + 0.7,x - 0.6, y + 0.7 );
    heartShape.bezierCurveTo( x - 0.6, y + 1.1, x - 0.3, y + 1.54, x + 0.5, y + 1.9 );
    heartShape.bezierCurveTo( x + 1.2, y + 1.54, x + 1.6, y + 1.1, x + 1.6, y + 0.7 );
    heartShape.bezierCurveTo( x + 1.6, y + 0.7, x + 1.6, y, x + 1, y );
    heartShape.bezierCurveTo( x + 0.7, y, x + 0.5, y + 0.5, x + 0.5, y + 0.5 );

    const extrudeSettings = { depth: 0.4, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.1, bevelThickness: 0.1 };
    const heartGeo = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);
    const heartMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
    heartMesh = new THREE.Mesh(heartGeo, heartMat);
    heartMesh.scale.set(0.5, 0.5, 0.5);
    heartMesh.rotation.z = Math.PI;
    heartMesh.visible = false;
    scene.add(heartMesh);

    const light = new THREE.PointLight(0xffffff, 1, 100);
    light.position.set(0, 0, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    camera.position.z = 5;
}

// --- LÓGICA DE GESTOS ---
function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const hand = results.multiHandLandmarks[0];
        
        // Coordenadas de la palma (mapeadas a la pantalla)
        const palmX = (hand[9].x - 0.5) * 10;
        const palmY = -(hand[9].y - 0.5) * 10;

        // 1. Detectar Pellizco (Pinch) para agrandar
        const thumbTip = hand[4];
        const indexTip = hand[8];
        const distPinch = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
        
        if(distPinch < 0.05) {
            particles.material.size = 0.2;
        } else {
            particles.material.size = 0.05;
        }

        // 2. Contar dedos levantados
        const fingersUp = [8, 12, 16, 20].filter(i => hand[i].y < hand[i-2].y).length;

        if (fingersUp === 2) {
            // "Te amo Sofi" - Aquí lo simplificamos cambiando color y rotación
            // En un sistema real usaríamos una textura de texto.
            particles.material.color.setHex(0x00ff00);
            console.log("Te amo Sofi");
        } else if (fingersUp >= 4) {
            // Corazón 3D
            heartMesh.visible = true;
            heartMesh.position.set(palmX, palmY, 0);
            particles.visible = false;
        } else {
            heartMesh.visible = false;
            particles.visible = true;
            particles.material.color.setHex(0xff44aa);
        }
    }
}

// --- INICIALIZACIÓN ---
initThree();

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
hands.onResults(onResults);

const cameraControl = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640, height: 480
});
cameraControl.start();

function animate() {
    requestAnimationFrame(animate);
    particles.rotation.y += 0.002;
    if(heartMesh.visible) heartMesh.rotation.y += 0.05;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
