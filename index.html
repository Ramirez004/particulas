<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Corazón Fluido para Sofi</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 40px; left: 40px; color: #ff69b4;
            font-size: 28px; font-weight: bold; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,20,147,0.7); z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN DE ESCENA ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let particles;
let targetRotX = 0;
let targetRotY = 0;
let targetScale = 1;
let currentScale = 1;
const lerpFactor = 0.03; // Movimiento lento y fluido

// --- CREACIÓN DEL CORAZÓN ---
function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 5000;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        const r = 0.2 + Math.random() * 0.8; 
        
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 10;

        positions[i * 3] = (x / 12) * r;
        positions[i * 3 + 1] = (y / 12) * r;
        positions[i * 3 + 2] = (z / 12) * r;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xff1493, size: 0.04, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
    });
    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}
createHeart();

// --- LÓGICA DE MANOS ---
const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.5, // Más sensible para que empiece a moverse fácil
    minTrackingConfidence: 0.5
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        
        // Detección de dedos
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // Escala
        const dist = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
        targetScale = 0.6 + (dist * 5);

        // SENSIBILIDAD
        if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
            // Muy sensible (mano abierta)
            targetRotY = (wrist.x - 0.5) * 10; 
            targetRotX = (wrist.y - 0.5) * 7;
        } else if (isIndexUp) {
            // Sensibilidad normal (dedo índice)
            targetRotY = (wrist.x - 0.5) * 4;
            targetRotX = (wrist.y - 0.5) * 3;
        }
    }
});

// Inicialización de cámara corregida
const cameraUtils = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});
cameraUtils.start();

// --- BUCLE DE ANIMACIÓN (AQUÍ OCURRE EL MOVIMIENTO) ---
function animate() {
    requestAnimationFrame(animate);
    
    if (particles) {
        // Suavizado de Escala
        currentScale += (targetScale - currentScale) * lerpFactor;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Suavizado de Rotación (El corazón se inclina hacia la mano)
        particles.rotation.y += (targetRotY - (particles.rotation.y - (Math.sin(Date.now()*0.001)*0.2))) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;
        
        // Rotación constante sutil para que NUNCA esté estático
        particles.rotation.y += 0.003;
        
        // Pequeño bamboleo orgánico
        particles.position.y = Math.sin(Date.now() * 0.001) * 0.1;
    }

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
