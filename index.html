<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SOFIA ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* TEXTO FIJO EN PANTALLA */
#nombre{
    position:absolute;
    top:40px;
    width:100%;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    color:white;
    font-family:Arial, sans-serif;
    z-index:10;
    text-shadow:0 0 20px hotpink;
}

video{
    display:none;
}
</style>
</head>

<body>

<div id="nombre">SOFIA ❤️</div>
<video id="video" autoplay playsinline></video>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= PARTICLES =================
let particles, geometry, material;
const particleCount = 1500;

function createHeart(){

    geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for(let i=0;i<particleCount;i++){
        const t = Math.random()*Math.PI*2;
        let x = 16 * Math.pow(Math.sin(t),3);
        let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
        let z = (Math.random()-0.5)*2;
        x/=16; y/=16;

        positions[i*3]=x;
        positions[i*3+1]=y;
        positions[i*3+2]=z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

    material = new THREE.PointsMaterial({
        color:0xff69b4,
        size:0.05
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

createHeart();

// ================= MEDIAPIPE =================
const videoElement = document.getElementById("video");

const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:2,
    modelComplexity:0,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.6
});

// SUAVIZADO
let targetRotX = 0;
let targetRotY = 0;

hands.onResults(results => {

    if(results.multiHandLandmarks.length > 0){

        const wrist = results.multiHandLandmarks[0][0];

        // BAJA SENSIBILIDAD (ANTES era *6)
        targetRotY = (wrist.x - 0.5) * 2;
        targetRotX = (wrist.y - 0.5) * 2;
    }

    if(results.multiHandLandmarks.length === 2){

        const w1 = results.multiHandLandmarks[0][0];
        const w2 = results.multiHandLandmarks[1][0];

        const dx = w1.x - w2.x;
        const dy = w1.y - w2.y;
        const distance = Math.sqrt(dx*dx + dy*dy);

        const scale = 1 + distance * 2; // menos exagerado
        particles.scale.set(scale,scale,scale);

        material.color.setHSL(distance*2,1,0.5);
    }
});

const cameraUtils = new Camera(videoElement,{
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width:640,
    height:480
});

cameraUtils.start();

// ================= ANIMATION =================
function animate(){
    requestAnimationFrame(animate);

    // SUAVIZADO (interpolación)
    particles.rotation.x += (targetRotX - particles.rotation.x) * 0.1;
    particles.rotation.y += (targetRotY - particles.rotation.y) * 0.1;

    renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
