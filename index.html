<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Sofi - Partículas Estables</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video-container { position: fixed; bottom: 10px; left: 10px; width: 150px; border-radius: 10px; border: 2px solid #ff0077; overflow: hidden; z-index: 100; transform: scaleX(-1); }
        #video-container video { width: 100%; display: block; }
        .instrucciones { position: fixed; top: 20px; right: 20px; color: #ff0077; text-align: right; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>

<div class="instrucciones">
    <h2>✨ Gestos Mágicos</h2>
    <p>✌️ 2 Dedos: <b>"TE AMO SOFI"</b></p>
    <p>🤟 3 Dedos: <b>Saturno</b></p>
    <p>🖐️ Mano Abierta: <b>Corazón</b></p>
    <p>👌 Pellizco: <b>Atracción</b></p>
</div>

<div id="video-container"><video id="input_video"></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, particles;
const COUNT = 12000; // Más partículas para mejor definición
let positions, targets, currentMode = 'IDLE';

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    positions = new Float32Array(COUNT * 3);
    targets = new Float32Array(COUNT * 3);

    // Inicializar en nube aleatoria
    for(let i=0; i<COUNT*3; i++) {
        positions[i] = (Math.random() - 0.5) * 20;
        targets[i] = positions[i];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ size: 0.04, color: 0xff0077, transparent: true, opacity: 0.8 });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);

    camera.position.z = 12;
}

// --- GENERADORES DE FORMAS MATEMÁTICAS ---

function createHeart(handX, handY) {
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const t = Math.random() * Math.PI * 2;
        // Ecuación paramétrica del corazón
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        targets[i3] = (x / 4) + handX;
        targets[i3+1] = (y / 4) + handY;
        targets[i3+2] = (Math.random() - 0.5) * 2;
    }
}

function createText() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; canvas.height = 200;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TE AMO SOFI', 300, 100);
    
    const data = ctx.getImageData(0,0,600,200).data;
    const points = [];
    for(let y=0; y<200; y+=2) {
        for(let x=0; x<600; x+=2) {
            if(data[(y*600 + x)*4 + 3] > 128) {
                points.push({x: (x-300)/20, y: -(y-100)/20});
            }
        }
    }
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const p = points[i % points.length];
        targets[i3] = p.x;
        targets[i3+1] = p.y;
        targets[i3+2] = (Math.random() - 0.5);
    }
}

function createSaturn() {
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        if (i < COUNT * 0.4) { // Esfera central
            const u = Math.random(), v = Math.random();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            targets[i3] = 2.5 * Math.sin(phi) * Math.cos(theta);
            targets[i3+1] = 2.5 * Math.sin(phi) * Math.sin(theta);
            targets[i3+2] = 2.5 * Math.cos(phi);
        } else { // Anillos
            const r = 4 + Math.random() * 2, a = Math.random() * Math.PI * 2;
            targets[i3] = r * Math.cos(a);
            targets[i3+1] = r * Math.sin(a) * 0.3; // Inclinación
            targets[i3+2] = r * Math.sin(a) * 0.5;
        }
    }
}

function createPinch(handX, handY) {
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 2;
        targets[i3] = handX + Math.cos(angle) * dist;
        targets[i3+1] = handY + Math.sin(angle) * dist;
        targets[i3+2] = (Math.random() - 0.5) * 5;
    }
}

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        // Volver a estado aleatorio si no hay mano
        for(let i=0; i<COUNT*3; i+=3) {
            targets[i] = (Math.random() - 0.5) * 25;
            targets[i+1] = (Math.random() - 0.5) * 20;
        }
        return;
    }

    const hand = results.multiHandLandmarks[0];
    const handX = -(hand[9].x - 0.5) * 25; // Invertido para que coincida con espejo
    const handY = -(hand[9].y - 0.5) * 18;

    const fingersUp = [8, 12, 16, 20].filter(i => hand[i].y < hand[i-2].y).length;
    const distPinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);

    if (distPinch < 0.04) {
        createPinch(handX, handY);
        particles.material.color.setHex(0x00ffff);
    } else if (fingersUp === 2) {
        createText();
        particles.material.color.setHex(0xff0077);
    } else if (fingersUp === 3) {
        createSaturn();
        particles.material.color.setHex(0xffaa00);
    } else if (fingersUp >= 4) {
        createHeart(handX, handY);
        particles.material.color.setHex(0xff0000);
    }
}

// --- CONFIGURACIÓN DE CÁMARA ---
const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
hands.onResults(onResults);

new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640, height: 480
}).start();

init();

function animate() {
    requestAnimationFrame(animate);
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT * 3; i++) {
        // El factor 0.05 hace que el movimiento sea MUCHO más suave y lento
        pos[i] += (targets[i] - pos[i]) * 0.05;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
