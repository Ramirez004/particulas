<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Sofi's Sphere Heart - Ultra Fluid</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: radial-gradient(circle, #100510 0%, #000 100%); 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
        }
        video { display: none; }
        
        #ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            background: rgba(255, 20, 147, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Soporte Safari */
            border-left: 3px solid #ff1493;
            border-radius: 6px;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            pointer-events: none; /* No interfiere con clics */
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN THREE JS (OPTIMIZADA PARA FLUIDEZ) ---
const scene = new THREE.Scene();
// Fog añade profundidad sutil
scene.fog = new THREE.FogExp2(0x000000, 0.15);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 4; // Un poco más cerca para ver el detalle esférico

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
// Limitamos el pixel ratio para mejor rendimiento en móviles, manteniendo calidad
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// --- VARIABLES DE ESTADO ---
let particles;
let particleGeometry;
const particleCount = 6000; // Más partículas para una esfera densa
let originalPositions; // Para el efecto de latido

let targetScale = 1.0;
let currentScale = 1.0;
let targetRotX = 0;
let targetRotY = 0;

// CLAVE DE LA FLUIDEZ EXTREMA: Un valor muy bajo (0.02) hace el movimiento "lento pero de seda"
const lerpFactor = 0.02; 

// --- CREACIÓN DEL CORAZÓN ESFÉRICO CERRADO ---
function createSphericalHeart() {
    particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    originalPositions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const pColor = new THREE.Color(0xff1493); // Deep Pink

    for (let i = 0; i < particleCount; i++) {
        // Generar puntos dentro de una esfera compacta (distribución uniforme)
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        
        // Radio base de la esfera "cerrada"
        const r = 0.8 + Math.random() * 0.2; 

        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);

        // Guardamos posiciones
        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        
        originalPositions[i * 3] = x;
        originalPositions[i * 3 + 1] = y;
        originalPositions[i * 3 + 2] = z;

        // Color sutil variante
        const h = pColor.h + (Math.random() - 0.5) * 0.05;
        pColor.setHSL(h, 1, 0.5);
        colors[i * 3] = pColor.r;
        colors[i * 3 + 1] = pColor.g;
        colors[i * 3 + 2] = pColor.b;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    // Material etéreo
    const material = new THREE.PointsMaterial({
        size: 0.018, // Partículas más pequeñas
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending, // Brillo mágico
        opacity: 0.7,
        depthWrite: false, // Mejora transparencia superpuesta
    });

    particles = new THREE.Points(particleGeometry, material);
    // Orientación inicial estática
    particles.rotation.set(0, 0, 0);
    scene.add(particles);
}

createSphericalHeart();

// --- LÓGICA DE DETECCIÓN DE MANOS (MEDIAPIPE) ---
const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.8, // Alta confianza para estabilidad
    minTrackingConfidence: 0.8
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        
        // Detección precisa de dedos (y menor = más arriba en pantalla)
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // 1. ESCALA ULTRA-SUAVE (Pulgar e Índice siempre activa)
        // Usamos distancia 3D para mayor precisión
        const dist = Math.sqrt(
            Math.pow(landmarks[4].x - landmarks[8].x, 2) + 
            Math.pow(landmarks[4].y - landmarks[8].y, 2) +
            Math.pow(landmarks[4].z - landmarks[8].z, 2)
        );
        targetScale = 0.8 + (dist * 6); // Rango de escala controlado

        // 2. CONTROL DE SENSIBILIDAD DINÁMICA (Mantenemos tu lógica)
        if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
            // MODO MANO ABIERTA: Mayor amplitud de giro, pero lerpFactor bajo mantiene fluidez lenta
            targetRotY = (wrist.x - 0.5) * 10; 
            targetRotX = (wrist.y - 0.5) * 7;
        } 
        else if (isIndexUp) {
            // MODO SÓLO ÍNDICE: Rotación más contenida
            targetRotY = (wrist.x - 0.5) * 4;
            targetRotX = (wrist.y - 0.5) * 2.5;
        }
    }
});

// Configuración de cámara MediaPipe
const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280,
    height: 720
});
cameraUtils.start();

// --- LOOP DE ANIMACIÓN (NÚCLEO DE LA FLUIDEZ) ---
function animate() {
    requestAnimationFrame(animate);

    if (particles) {
        // APLICAR LERP (Interpolación Lineal Super Suave)
        
        // Escala (usamos un lerp ligeramente más rápido aquí para que responda al gesto, pero siga siendo suave)
        currentScale += (targetScale - currentScale) * 0.05; 
        particles.scale.set(currentScale, currentScale, currentScale);

        // Rotación (Usamos el lerpFactor ultra bajo de 0.02 para máxima lentitud fluida)
        // Esto elimina cualquier vibración de la mano.
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;

        // EFECTO ÓPTICO DE "LATIDO CERRADO" (Tridimensional)
        // Modificamos las posiciones de las partículas en cada frame sutilmente
        const time = Date.now() * 0.001;
        const positions = particleGeometry.attributes.position.array;
        
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            // Un pulso sinusoidal sutil que afecta el radio de cada partícula
            // Multiplicamos por originalPositions para expandir/contraer desde el centro
            const pulse = 1 + Math.sin(time * 2 + originalPositions[i3] * 5) * 0.015;
            
            positions[i3] = originalPositions[i3] * pulse;
            positions[i3+1] = originalPositions[i3+1] * pulse;
            positions[i3+2] = originalPositions[i3+2] * pulse;
        }
        // Necesario para que Three.js actualice la geometría en GPU
        particleGeometry.attributes.position.needsUpdate = true;

        // Brillo intermitente global sutil
        particles.material.opacity = 0.6 + Math.sin(time * 1.5) * 0.1;
    }

    renderer.render(scene, camera);
}
animate();

// Ajuste dinámico de ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
