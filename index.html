<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Heart for Sofi - Interactive</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 30px; left: 30px; color: white;
            font-size: 26px; font-weight: 300; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,105,180,0.9); z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- ESCENA THREE JS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

let particles;
let targetScale = 1;
let currentScale = 1;
let targetRotX = 0;
let targetRotY = 0;
const lerpFactor = 0.08; // Suavizado (más bajo = más lento/fluido)

function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 3500;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 6; 

        positions[i * 3] = (x / 16);
        positions[i * 3 + 1] = (y / 16);
        positions[i * 3 + 2] = z / 16;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xff1493, size: 0.035, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.7
    });
    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}
createHeart();

// --- TRACKING Y LÓGICA ---
const videoElement = document.getElementById('video');
const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

hands.setOptions({
    maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // 1. Escala (Distancia entre dedos)
        const thumb = landmarks[4];
        const index = landmarks[8];
        const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
        targetScale = 0.7 + (dist * 7);

        // 2. Rotación (Posición de la mano en pantalla)
        // Mapeamos x (0 a 1) a rotación Y (-1 a 1 radianes aprox)
        // Mapeamos y (0 a 1) a rotación X
        const palm = landmarks[0]; // La muñeca/base es mejor para la rotación
        targetRotY = (palm.x - 0.5) * 5; 
        targetRotX = (palm.y - 0.5) * 2;
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720
});
cameraUtils.start();

// --- ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);
    if (particles) {
        // Aplicar suavizado (Lerp) a Escala
        currentScale += (targetScale - currentScale) * lerpFactor;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Aplicar suavizado (Lerp) a Rotación
        // Sumamos una rotación constante + la posición de la mano
        particles.rotation.y += (targetRotY - (particles.rotation.y - (Date.now()*0.001))) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;
        
        // Giro automático suave de fondo
        particles.rotation.y += 0.005;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
