<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Interactivo</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}
#video-container{
position:fixed;bottom:10px;left:10px;width:130px;
border:2px solid #ff0077;border-radius:10px;
overflow:hidden;transform:scaleX(-1);}
#video-container video{width:100%;}
.hud{
position:fixed;top:20px;left:20px;color:white;
background:rgba(255,0,119,.15);
padding:15px;border-radius:10px;}
</style>
</head>
<body>

<div class="hud">
<h3>Comandos</h3>
<p>• 2 Dedos → Texto</p>
<p>• 3 Dedos → Saturno</p>
<p>• Mano Abierta → Espacio</p>
<p>• Puño Cerrado → Corazón</p>
</div>

<div id="video-container">
<video id="input_video" autoplay muted playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const COUNT=10000;
let scene,camera,renderer,particles;
let positions,targets;
let currentMode="";
let rotationSpeed=0;
let lerpSpeed=0.07;

function init(){
scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.z=18;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const geo=new THREE.BufferGeometry();
positions=new Float32Array(COUNT*3);
targets=new Float32Array(COUNT*3);

for(let i=0;i<COUNT*3;i++){
positions[i]=(Math.random()-.5)*40;
targets[i]=positions[i];
}

geo.setAttribute("position",new THREE.BufferAttribute(positions,3));

const mat=new THREE.PointsMaterial({
size:.05,
color:0xff0077,
transparent:true,
opacity:.9,
blending:THREE.AdditiveBlending,
depthWrite:false
});

particles=new THREE.Points(geo,mat);
scene.add(particles);
}

function setMode(mode){
if(currentMode!==mode){
currentMode=mode;
particles.rotation.set(0,0,0);
camera.position.z=18;
}
}

/* ===== TEXTO ===== */
function createText(){
setMode("text");
rotationSpeed=.003;
lerpSpeed=0.08;
particles.material.color.setHex(0xff0077);

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=900;canvas.height=200;
ctx.fillStyle="white";
ctx.font="bold 80px Arial";
ctx.textAlign="center";
ctx.fillText("TE AMO SOFI",450,120);

const data=ctx.getImageData(0,0,900,200).data;
const pts=[];
for(let y=0;y<200;y+=4){
for(let x=0;x<900;x+=4){
if(data[(y*900+x)*4+3]>128)
pts.push({x:(x-450)/20,y:-(y-100)/20});
}}
for(let i=0;i<COUNT;i++){
const p=pts[i%pts.length];
const i3=i*3;
targets[i3]=p.x;
targets[i3+1]=p.y;
targets[i3+2]=(Math.random()-.5)*2;
}
}

/* ===== SATURNO ===== */
function createSaturn(){
setMode("saturn");
rotationSpeed=.002;
lerpSpeed=0.06;
particles.material.color.setHex(0xffaa00);

for(let i=0;i<COUNT;i++){
const i3=i*3;

if(i<COUNT*.6){
const u=Math.random();
const v=Math.random();
const theta=2*Math.PI*u;
const phi=Math.acos(2*v-1);
const r=4;

targets[i3]=r*Math.sin(phi)*Math.cos(theta);
targets[i3+1]=r*Math.sin(phi)*Math.sin(theta);
targets[i3+2]=r*Math.cos(phi);

}else{
const angle=Math.random()*Math.PI*2;
const radius=6.5+Math.random()*1;
const tilt=0.5;

const x=Math.cos(angle)*radius;
const z=Math.sin(angle)*radius;

targets[i3]=x;
targets[i3+1]=Math.sin(tilt)*z;
targets[i3+2]=Math.cos(tilt)*z;
}
}
}

/* ===== CORAZÓN ===== */
function createHeart(){
setMode("heart");
rotationSpeed=.0015;
lerpSpeed=0.06;
particles.material.color.setHex(0xff0033);

for(let i=0;i<COUNT;i++){
const i3=i*3;
const t=Math.random()*Math.PI*2;
const x=16*Math.pow(Math.sin(t),3);
const y=13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

targets[i3]=x*.4;
targets[i3+1]=y*.4;
targets[i3+2]=(Math.random()-.5)*2;
}
}

/* ===== ESPACIO (MANO ABIERTA) ===== */
function createSpace(){
setMode("space");
rotationSpeed=.00005;
lerpSpeed=0.001;
particles.material.color.setHex(0x66ccff);
camera.position.z=14;

for(let i=0;i<COUNT;i++){
const i3=i*3;
targets[i3]=(Math.random()-.5)*60;
targets[i3+1]=(Math.random()-.5)*60;
targets[i3+2]=(Math.random()-.5)*80;
}
}

/* ===== DETECCIÓN ESTABLE ===== */
function isFingerUp(tip,pip){
return tip.y < pip.y;
}

function onResults(results){

if(!results.multiHandLandmarks||!results.multiHandLandmarks.length)
return;

const h=results.multiHandLandmarks[0];

const indexUp=isFingerUp(h[8],h[6]);
const middleUp=isFingerUp(h[12],h[10]);
const ringUp=isFingerUp(h[16],h[14]);
const pinkyUp=isFingerUp(h[20],h[18]);

const count=[indexUp,middleUp,ringUp,pinkyUp].filter(Boolean).length;

if(count===0) createHeart();
else if(count===3) createSaturn();
else if(count===2 && indexUp && middleUp) createText();
else if(count===4) createSpace();
}

/* ===== ANIMACIÓN ===== */
function animate(){
requestAnimationFrame(animate);

const pos=particles.geometry.attributes.position.array;
for(let i=0;i<COUNT*3;i++)
pos[i]+=(targets[i]-pos[i])*lerpSpeed;

particles.rotation.y+=rotationSpeed;
particles.geometry.attributes.position.needsUpdate=true;

renderer.render(scene,camera);
}

/* ===== MEDIAPIPE ===== */
const video=document.getElementById("input_video");
const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({
maxNumHands:1,
modelComplexity:1,
minDetectionConfidence:.75,
minTrackingConfidence:.75
});
hands.onResults(onResults);

new Camera(video,{
onFrame:async()=>{await hands.send({image:video});},
width:640,height:480
}).start();

init();
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
