<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universo para Sofia</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video-container { position: fixed; bottom: 15px; right: 15px; width: 140px; border: 2px solid #ff0077; border-radius: 10px; overflow: hidden; z-index: 100; transform: scaleX(-1); opacity: 0.8; }
        #video-container video { width: 100%; display: block; }
        .hud { position: fixed; top: 20px; left: 20px; color: #ff0077; pointer-events: none; z-index: 10; text-shadow: 0 0 10px rgba(0,0,0,1); }
        b { color: #fff; }
    </style>
</head>
<body>

<div class="hud">
    <h2>✨ Comandos Estelares</h2>
    <p>✌️ 2 Dedos: <b>"TE AMO SOFIA"</b></p>
    <p>🤟 3 Dedos: <b>Saturno Dorado</b></p>
    <p>🖐️ Mano Abierta: <b>Corazón + Partículas Grandes</b></p>
    <p>👌 Pellizco: <b>Atracción Magnética</b></p>
</div>

<div id="video-container"><video id="input_video"></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, particles;
const COUNT = 15000; // Máxima densidad para Sofia
let positions, targets;
let targetSize = 0.035;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    positions = new Float32Array(COUNT * 3);
    targets = new Float32Array(COUNT * 3);

    for(let i=0; i<COUNT*3; i++) {
        positions[i] = (Math.random() - 0.5) * 30;
        targets[i] = positions[i];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ size: 0.035, color: 0xff0077, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);

    camera.position.z = 15;
}

// --- GENERADORES DE FORMAS MEJORADOS ---

function createHeart(hX, hY) {
    targetSize = 0.08; // AGRANDAR partículas al abrir la mano
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const t = Math.random() * Math.PI * 2;
        // Ecuación paramétrica de corazón 3D (ajustada para ser más rellena)
        const r = Math.random();
        const x = 16 * Math.pow(Math.sin(t), 3) * r;
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
        targets[i3] = (x / 3) + hX;
        targets[i3+1] = (y / 3) + hY;
        targets[i3+2] = (Math.random() - 0.5) * 3;
    }
}

function createText() {
    targetSize = 0.035;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 200;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TE AMO SOFIA', 400, 100);
    
    const data = ctx.getImageData(0,0,800,200).data;
    const points = [];
    for(let y=0; y<200; y+=2) {
        for(let x=0; x<800; x+=2) {
            if(data[(y*800 + x)*4 + 3] > 128) points.push({x: (x-400)/20, y: -(y-100)/20});
        }
    }
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const p = points[i % points.length];
        targets[i3] = p.x;
        targets[i3+1] = p.y;
        targets[i3+2] = (Math.random() - 0.5);
    }
}

function createSaturn() {
    targetSize = 0.04;
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        if (i < COUNT * 0.4) { // Planeta sólido
            const u = Math.random(), v = Math.random();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            targets[i3] = 3.5 * Math.sin(phi) * Math.cos(theta);
            targets[i3+1] = 3.5 * Math.sin(phi) * Math.sin(theta);
            targets[i3+2] = 3.5 * Math.cos(phi);
        } else { // Anillo definido
            const r = 5.5 + Math.random() * 2.5;
            const a = Math.random() * Math.PI * 2;
            targets[i3] = r * Math.cos(a);
            targets[i3+1] = (r * Math.sin(a) * 0.4); // Inclinación eje Y
            targets[i3+2] = (r * Math.sin(a) * 0.8); // Profundidad Z
        }
    }
}

function createPinch(hX, hY) {
    targetSize = 0.02; // Partículas pequeñas y densas al pellizcar
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const dist = Math.random() * 1.5;
        const angle = Math.random() * Math.PI * 2;
        targets[i3] = hX + Math.cos(angle) * dist;
        targets[i3+1] = hY + Math.sin(angle) * dist;
        targets[i3+2] = (Math.random() - 0.5) * 4;
    }
}

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        targetSize = 0.03;
        for(let i=0; i<COUNT*3; i+=3) {
            targets[i] = (Math.random() - 0.5) * 30;
            targets[i+1] = (Math.random() - 0.5) * 20;
        }
        return;
    }

    const hand = results.multiHandLandmarks[0];
    const hX = -(hand[9].x - 0.5) * 28; 
    const hY = -(hand[9].y - 0.5) * 20;

    const fingersUp = [8, 12, 16, 20].filter(i => hand[i].y < hand[i-2].y).length;
    const distPinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);

    if (distPinch < 0.04) {
        createPinch(hX, hY);
        particles.material.color.setHex(0x00ffff);
    } else if (fingersUp === 2) {
        createText();
        particles.material.color.setHex(0xff0077);
    } else if (fingersUp === 3) {
        createSaturn();
        particles.material.color.setHex(0xffaa00);
    } else if (fingersUp >= 4) {
        createHeart(hX, hY);
        particles.material.color.setHex(0xff3333);
    }
}

const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75 });
hands.onResults(onResults);

new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 }).start();

init();

function animate() {
    requestAnimationFrame(animate);
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT * 3; i++) {
        // Velocidad de 0.07 para que sea suave pero responda rápido
        pos[i] += (targets[i] - pos[i]) * 0.07;
    }
    // Suavizado del tamaño de partícula
    particles.material.size += (targetSize - particles.material.size) * 0.1;
    
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.002; // Rotación constante de la escena
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
