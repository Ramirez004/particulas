<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Universo Interactivo - Corregido</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: fixed; bottom: 10px; left: 10px; width: 130px; border: 2px solid #ff0077; border-radius: 10px; overflow: hidden; z-index: 100; transform: scaleX(-1); }
        #video-container video { width: 100%; display: block; }
        .hud { position: fixed; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; background: rgba(255, 0, 119, 0.18); padding: 15px; border-radius: 10px; border: 1px solid #ff0077; }
        h3 { margin: 0 0 10px 0; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 14px; opacity: 0.9; }
    </style>
</head>
<body>

<div class="hud">
    <h3>Comandos</h3>
    <p>• 2 Dedos</p>
    <p>• 3 Dedos</p>
    <p>• Mano Abierta</p>
    <p>• Puño Cerrado</p>
    <p>• Pellizco</p>
</div>

<div id="video-container"><video id="input_video" autoplay muted playsinline></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* --------- Config --------- */
const COUNT = 12000; // si tu PC va lento, baja este número (ej: 4000)
const sceneRange = 20; // escala de la escena

/* --------- THREE setup --------- */
let scene, camera, renderer, particles, particleGroup;
let positions, targets, baseTargets;
let particleMaterial;
let currentMode = 'text'; // 'text'|'saturn'|'open'|'heart'|'pinch'
let handOffsetX = 0, handOffsetY = 0;
let saturnAngle = 0;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Grupo que mantiene todo centrado; así siempre está en el centro de la pantalla
    particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const geo = new THREE.BufferGeometry();
    positions = new Float32Array(COUNT * 3);
    targets = new Float32Array(COUNT * 3);
    baseTargets = new Float32Array(COUNT * 3);

    // posiciones iniciales aleatorias
    for (let i = 0; i < COUNT * 3; i++) {
        positions[i] = (Math.random() - 0.5) * sceneRange;
        targets[i] = positions[i];
        baseTargets[i] = positions[i];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleMaterial = new THREE.PointsMaterial({
        size: 0.04,
        color: 0xff0077,
        transparent: true,
        opacity: 0.9,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    particles = new THREE.Points(geo, particleMaterial);
    particleGroup.add(particles);

    camera.position.z = 25;
}

/* --------- Formas (llenan baseTargets) --------- */

function createHeart(hX, hY) {
    targetSize = 0.16;

    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const t = Math.random() * Math.PI * 2;
        const scale = 0.6;

        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);

        targets[i3] = x * scale + hX;
        targets[i3+1] = y * scale + hY;
        targets[i3+2] = 0; // <- sin ruido en Z (antes lo metías random)
    }
}

function createSaturn() {
    // llenamos baseTargets con planeta + anillo; los rotaremos dinámicamente en animate
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        if (i < COUNT * 0.45) { // núcleo - esfera
            // puntos en esfera
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = 4 * Math.pow(Math.random(), 1/3); // densidad en el centro
            baseTargets[i3]   = r * Math.sin(phi) * Math.cos(theta);
            baseTargets[i3+1] = r * Math.sin(phi) * Math.sin(theta);
            baseTargets[i3+2] = r * Math.cos(phi);
        } else { // anillo
            const radius = 6 + Math.random() * 2.5;
            const a = Math.random() * Math.PI * 2;
            // aplanamiento del anillo y algo de variación vertical
            baseTargets[i3]   = radius * Math.cos(a);
            baseTargets[i3+1] = (Math.random() - 0.5) * 0.6;
            baseTargets[i3+2] = radius * Math.sin(a) * 0.5;
        }
    }
    particleMaterial.size = 0.05;
    particleMaterial.color.setHex(0xffaa00);
    currentMode = 'saturn';
    saturnAngle = 0;
}

function createText() {
    // "TE AMO SOFIA" usando canvas -> tomar puntos y asignarlos a baseTargets
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 900; canvas.height = 200;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TE AMO SOFIA', canvas.width/2, canvas.height/1.6);

    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const points = [];
    for (let y = 0; y < canvas.height; y += 4) {
        for (let x = 0; x < canvas.width; x += 4) {
            if (data[(y*canvas.width + x)*4 + 3] > 128) {
                points.push({ x: (x - canvas.width/2) / 22, y: -(y - canvas.height/2) / 22 });
            }
        }
    }
    if (points.length === 0) return;
    for (let i = 0; i < COUNT; i++) {
        const p = points[i % points.length];
        const i3 = i * 3;
        baseTargets[i3]   = p.x + (Math.random() - 0.5) * 0.4;
        baseTargets[i3+1] = p.y + (Math.random() - 0.5) * 0.4;
        baseTargets[i3+2] = (Math.random() - 0.5) * 1.0;
    }
    particleMaterial.size = 0.06;
    particleMaterial.color.setHex(0xff0077);
    currentMode = 'text';
}

function createPinch(hX, hY) {
    targetSize = 0.03;

    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;

        const r = Math.random() * 2;
        const a = Math.random() * Math.PI * 2;

        targets[i3] = hX + Math.cos(a) * r;
        targets[i3+1] = hY + Math.sin(a) * r;

        // MUCHÍSIMO más cerca de la cámara
        targets[i3+2] = (Math.random() - 0.5) * 2 - 10;
    }

    // acercamos cámara ligeramente
    camera.position.z = 8;
}

function createOpenField() {
    // partículas repartidas por toda la escena; no centradas en texto ni forma
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        baseTargets[i3]   = (Math.random() - 0.5) * sceneRange * 1.5;
        baseTargets[i3+1] = (Math.random() - 0.5) * (sceneRange * 0.6);
        baseTargets[i3+2] = (Math.random() - 0.5) * sceneRange;
    }
    particleMaterial.size = 0.04;
    particleMaterial.color.setHex(0x88ccff);
    currentMode = 'open';
}

/* --------- Mediapipe / detección --------- */

function isFingerExtended(tip, pip, mcp) {
    return tip.y < pip.y && pip.y < mcp.y;
}

function isFingerFolded(tip, mcp) {
    const dist = Math.hypot(tip.x - mcp.x, tip.y - mcp.y);
    return dist < 0.08; // umbral estable
}

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

    const hand = results.multiHandLandmarks[0];

    const hX = -(hand[9].x - 0.5) * 30;
    const hY = -(hand[9].y - 0.5) * 20;

    const indexUp  = isFingerExtended(hand[8], hand[6], hand[5]);
    const middleUp = isFingerExtended(hand[12], hand[10], hand[9]);
    const ringUp   = isFingerExtended(hand[16], hand[14], hand[13]);
    const pinkyUp  = isFingerExtended(hand[20], hand[18], hand[17]);

    const indexFold  = isFingerFolded(hand[8], hand[5]);
    const middleFold = isFingerFolded(hand[12], hand[9]);
    const ringFold   = isFingerFolded(hand[16], hand[13]);
    const pinkyFold  = isFingerFolded(hand[20], hand[17]);

    const distPinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);

    // PRIORIDAD ORDENADA

    if (distPinch < 0.045) {
        createPinch(hX, hY);
        particles.material.color.setHex(0x00ffff);
    }

    // PUÑO REAL (todos doblados)
    else if (indexFold && middleFold && ringFold && pinkyFold) {
        createHeart(hX, hY);
        particles.material.color.setHex(0xff0000);
    }

    // MANO ABIERTA REAL (todos extendidos)
    else if (indexUp && middleUp && ringUp && pinkyUp) {
        createOpenField(hX, hY);
        particles.material.color.setHex(0x88ccff);
    }

    // 3 dedos
    else if (indexUp && middleUp && ringUp && !pinkyUp) {
        createSaturn();
        particles.material.color.setHex(0xffaa00);
    }

    // 2 dedos
    else if (indexUp && middleUp && !ringUp) {
        createText();
        particles.material.color.setHex(0xff0077);
    }
}

/* --------- Render loop y lógica de movimiento --------- */

function animate() {
    requestAnimationFrame(animate);
    camera.position.z += (15 - camera.position.z) * 0.05;
    // Rotación constante del grupo para que la "imagen 3D" gire sobre su propio eje
    particleGroup.rotation.y += 0.004; // ajuste: velocidad de rotación global
    particles.rotation.x += 0.002;
    particles.rotation.y += 0.003;
    // Si estamos en saturn rotamos los baseTargets en Y (no modificamos baseTargets original,
    // sino que generamos targets rotados a partir de baseTargets)
    if (currentMode === 'saturn') {
        saturnAngle += 0.008;
        const c = Math.cos(saturnAngle), s = Math.sin(saturnAngle);
        // rotar sobre Y: x' = x*c - z*s ; z' = x*s + z*c
        for (let i = 0; i < COUNT; i++) {
            const i3 = i*3;
            const bx = baseTargets[i3], by = baseTargets[i3+1], bz = baseTargets[i3+2];
            targets[i3]   = bx * c - bz * s;
            targets[i3+1] = by;
            targets[i3+2] = bx * s + bz * c;
        }
    } else if (currentMode === 'open') {
        // Cuando es open, las partículas siguen la mano: sumamos handOffsetX/Y a los baseTargets
        for (let i = 0; i < COUNT; i++) {
            const i3 = i*3;
            targets[i3]   = baseTargets[i3]   + handOffsetX * 0.6; // factor para que el seguimiento sea agradable
            targets[i3+1] = baseTargets[i3+1] + handOffsetY * 0.6;
            targets[i3+2] = baseTargets[i3+2];
        }
    } else {
        // modos "fijos" (text, heart, pinch): targets = baseTargets (interpolación hacia baseTargets)
        for (let i = 0; i < COUNT; i++) {
            const i3 = i*3;
            targets[i3]   = baseTargets[i3];
            targets[i3+1] = baseTargets[i3+1];
            targets[i3+2] = baseTargets[i3+2];
        }
    }

    // Interpolar posiciones actuales hacia targets (suavizado)
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT * 3; i++) {
        pos[i] += (targets[i] - pos[i]) * 0.12;
    }

    // Tamaño suave (si cambió antes en createX)
    // particleMaterial.size ya se ajustó en las funciones; aquí lo suavizamos aplicándolo directo.
    // (PointsMaterial.size no puede interpolarse con una propiedad de material directamente en buffer, así que lo dejamos estático)

    particles.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

/* --------- Inicialización mediapipe y cámara --------- */

const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
hands.onResults(onResults);

new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640,
    height: 480
}).start();

/* --------- Start scene --------- */
init();
createText(); // estado inicial
animate();

/* --------- Resize handling (mantiene el canvas centrado) --------- */
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
