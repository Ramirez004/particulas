<script>

// =========================
// THREE SETUP
// =========================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// PARTICLES
// =========================
let particles, geometry, material;
let particleCount = 2000;

function createParticles(type="heart") {

    if(particles) scene.remove(particles);

    geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for(let i=0;i<particleCount;i++){
        let x,y,z;

        const t = Math.random()*Math.PI*2;
        x = 16 * Math.pow(Math.sin(t),3);
        y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
        z = (Math.random()-0.5)*2;
        x/=16; y/=16;

        positions[i*3]=x;
        positions[i*3+1]=y;
        positions[i*3+2]=z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

    material = new THREE.PointsMaterial({
        color: 0xff69b4,
        size: 0.05
    });

    particles = new THREE.Points(geometry,material);
    scene.add(particles);
}

createParticles();

// =========================
// TEXTO 3D
// =========================
const loader = new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font){

    const textGeo = new THREE.TextGeometry("TE AMO SOFI", {
        font: font,
        size: 0.4,
        height: 0.05
    });

    const textMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const textMesh = new THREE.Mesh(textGeo, textMat);

    textGeo.center();
    textMesh.position.y = 2;
    scene.add(textMesh);
});

// =========================
// MEDIAPIPE
// =========================
const videoElement = document.getElementById('video');

const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

hands.onResults(results => {

    if(results.multiHandLandmarks.length === 2){

        const hand1 = results.multiHandLandmarks[0];
        const hand2 = results.multiHandLandmarks[1];

        const wrist1 = hand1[0];
        const wrist2 = hand2[0];

        // ROTACIÓN
        particles.rotation.y = (wrist1.x - 0.5) * 5;
        particles.rotation.x = (wrist2.y - 0.5) * 5;

        // ESCALA según distancia entre manos
        const dx = wrist1.x - wrist2.x;
        const dy = wrist1.y - wrist2.y;
        const distance = Math.sqrt(dx*dx + dy*dy);

        const scale = 1 + distance * 3;
        particles.scale.set(scale,scale,scale);

        // COLOR dinámico
        material.color.setHSL(distance*2,1,0.5);
    }
});

const cameraUtils = new Camera(videoElement,{
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640,
    height: 480
});
cameraUtils.start();

// =========================
// ANIMATE
// =========================
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});

</script>
