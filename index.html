<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Heart Experience - High Sensitivity</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a0a1a 0%, #000 100%); font-family: 'Inter', sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 40px; left: 40px; color: rgba(255, 255, 255, 0.9);
            padding: 15px 25px; background: rgba(255, 105, 180, 0.15); backdrop-filter: blur(10px);
            border-left: 4px solid #ff69b4; border-radius: 8px; font-size: 24px; font-weight: 300;
            letter-spacing: 3px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN THREE JS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 4.5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let particles;
let targetScale = 1.0;
let currentScale = 1.0;
let targetRotX = 0;
let targetRotY = 0;
let lerpFactor = 0.06; // Suavizado base

function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 4000;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 4; 
        positions[i * 3] = (x / 16);
        positions[i * 3 + 1] = (y / 16);
        positions[i * 3 + 2] = z / 16;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xff69b4, size: 0.028, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.7
    });
    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}
createHeart();

// --- LÓGICA DE DETECCIÓN AVANZADA ---
const videoElement = document.getElementById('video');
const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

hands.setOptions({
    maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        
        // Detección de dedos individuales (si y es menor que el nudillo, el dedo está arriba)
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // 1. Escala basada en pulgar e índice (siempre activa)
        const dist = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
        targetScale = 0.7 + (dist * 7);

        // 2. Control de Sensibilidad Dinámica
        if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
            // MODO MÁXIMA SENSIBILIDAD (Mano abierta)
            // Multiplicadores más altos para giros rápidos
            targetRotY = (wrist.x - 0.5) * 12; 
            targetRotX = (wrist.y - 0.5) * 8;
            lerpFactor = 0.12; // Reacción más instantánea
        } 
        else if (isIndexUp) {
            // MODO NORMAL (Solo índice)
            targetRotY = (wrist.x - 0.5) * 5;
            targetRotX = (wrist.y - 0.5) * 3;
            lerpFactor = 0.06; // Reacción más fluida y lenta
        }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720
});
cameraUtils.start();

// --- ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);
    if (particles) {
        // Aplicar escala suave
        currentScale += (targetScale - currentScale) * 0.1;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Aplicar rotación con la sensibilidad actual
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;

        // Brillo sutil constante
        particles.material.opacity = 0.6 + Math.sin(Date.now() * 0.002) * 0.1;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
