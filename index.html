<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Sofi's Solid Heart</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 40px; left: 40px; color: white;
            font-size: 24px; font-weight: 300; letter-spacing: 4px;
            text-shadow: 0 0 10px #ff1493; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let particles;
let targetScale = 1.0;
let currentScale = 1.0;
let targetRotX = 0;
let targetRotY = 0;
const lerpFactor = 0.02; // Fluidez máxima (lento y suave)

function createSolidHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 8000; // Más partículas para que se vea lleno
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        // Generamos un punto aleatorio dentro de un volumen
        // Usamos la fórmula del corazón para filtrar qué puntos mostrar
        const t = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = Math.pow(Math.random(), 1/3) * 1.5; // Distribución volumétrica

        // Coordenadas base
        let x = r * 16 * Math.pow(Math.sin(t), 3);
        let y = r * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        let z = (Math.random() - 0.5) * 8 * r; // Grosor para hacerlo 3D (esférico)

        positions[i * 3] = x / 15;
        positions[i * 3 + 1] = y / 15;
        positions[i * 3 + 2] = z / 15;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xff1493,
        size: 0.025,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.8
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

createSolidHeart();

const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // Escala
        const dist = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));
        targetScale = 0.7 + (dist * 6);

        // Sensibilidad según dedos
        if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
            targetRotY = (wrist.x - 0.5) * 10; 
            targetRotX = (wrist.y - 0.5) * 7;
        } else if (isIndexUp) {
            targetRotY = (wrist.x - 0.5) * 4;
            targetRotX = (wrist.y - 0.5) * 2.5;
        }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720
});
cameraUtils.start();

function animate() {
    requestAnimationFrame(animate);
    if (particles) {
        // Suavizado de escala
        currentScale += (targetScale - currentScale) * 0.05;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Suavizado de rotación (Lento y fluido)
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;

        // Giro automático casi imperceptible para dar vida
        particles.rotation.y += 0.001;
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
