<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Mobile 3D Hand Particle System</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
video { display: none; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// THREE JS SETUP
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

let particles, geometry, material;
let particleCount = 2000;
let shapeType = "heart";

function createParticles(type="heart") {

    if(particles) scene.remove(particles);

    geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for(let i=0;i<particleCount;i++){
        let x,y,z;

        if(type==="heart"){
            const t = Math.random() * Math.PI * 2;
            x = 16 * Math.pow(Math.sin(t),3);
            y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            z = (Math.random()-0.5)*2;
            x/=16; y/=16;
        }

        if(type==="saturn"){
            const angle = Math.random()*Math.PI*2;
            const radius = 2 + Math.random()*0.5;
            x = radius*Math.cos(angle);
            y = (Math.random()-0.5)*0.5;
            z = radius*Math.sin(angle);
        }

        if(type==="fire"){
            x = (Math.random()-0.5)*2;
            y = Math.random()*2;
            z = (Math.random()-0.5)*2;
        }

        positions[i*3]=x;
        positions[i*3+1]=y;
        positions[i*3+2]=z;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

    material = new THREE.PointsMaterial({
        color: 0xff69b4,
        size: 0.05
    });

    particles = new THREE.Points(geometry,material);
    scene.add(particles);
}

createParticles();

// MEDIAPIPE HAND TRACKING
const videoElement = document.getElementById('video');

const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

let lastX = 0;
let lastY = 0;

hands.onResults(results => {
    if(results.multiHandLandmarks.length > 0){

        const landmarks = results.multiHandLandmarks[0];

        const wrist = landmarks[0]; // muñeca
        const thumb = landmarks[4];
        const index = landmarks[8];

        // ROTACIÓN CON MOVIMIENTO
        let deltaX = wrist.x - lastX;
        let deltaY = wrist.y - lastY;

        if(particles){
            particles.rotation.y += deltaX * 5;
            particles.rotation.x += deltaY * 5;
        }

        lastX = wrist.x;
        lastY = wrist.y;

        // DISTANCIA PARA ESCALA Y COLOR
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const distance = Math.sqrt(dx*dx + dy*dy);

        particles.scale.set(1 + distance*5,1 + distance*5,1 + distance*5);
        material.color.setHSL(distance*2,1,0.5);

        if(distance > 0.25){
            createParticles("saturn");
        }
        if(distance < 0.1){
            createParticles("heart");
        }
    }
});

const cameraUtils = new Camera(videoElement,{
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640,
    height: 480
});
cameraUtils.start();

// ANIMATION LOOP
function animate(){
    requestAnimationFrame(animate);
    if(particles){
        particles.rotation.y += 0.005;
    }
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
