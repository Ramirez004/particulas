<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sofi 3D Heart - Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 30px; left: 30px; color: #ff69b4;
            font-size: 22px; font-weight: 300; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,20,147,0.5); z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN PARA MÓVIL ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true }); // Antialias off para fluidez en iPhone
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let particles;
let targetRotX = 0, targetRotY = 0;
let targetScale = 1.2, currentScale = 1.2;
const lerpFactor = 0.04; // Fluidez ajustada para táctil/móvil

// --- CREACIÓN DEL CORAZÓN VOLUMÉTRICO (ESFÉRICO) ---
function createHeart3D() {
    const geometry = new THREE.BufferGeometry();
    const count = 4000; // Balance ideal para iPhone
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        // El secreto del volumen: r controla el "relleno"
        const r = Math.pow(Math.random(), 0.5); 
        
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        
        // Z no es aleatorio, se basa en la forma para dar volumen "esférico"
        // Cuanto más al centro del corazón, más profundo es (z más grande)
        let zLimit = Math.sqrt(Math.max(0, 100 - (x*x + y*y) * 0.1)); 
        let z = (Math.random() - 0.5) * zLimit * 1.5;

        positions[i * 3] = (x / 12) * r;
        positions[i * 3 + 1] = (y / 12) * r;
        positions[i * 3 + 2] = (z / 12);
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.PointsMaterial({
        color: 0xff1493,
        size: 0.04,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.8,
        depthWrite: false // Crucial para transparencia fluida
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}
createHeart3D();

// --- LÓGICA DE MANOS ---
const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0, // 0 es más rápido para móviles
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const wrist = landmarks[0];
        
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        // Escala (Distancia dedos)
        const dX = landmarks[4].x - landmarks[8].x;
        const dY = landmarks[4].y - landmarks[8].y;
        const dist = Math.sqrt(dX*dX + dY*dY);
        targetScale = 0.8 + (dist * 5);

        // Sensibilidad iPhone (Valores más altos compensan el delay de cámara móvil)
        if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
            targetRotY = (wrist.x - 0.5) * 12; 
            targetRotX = (wrist.y - 0.5) * 8;
        } else if (isIndexUp) {
            targetRotY = (wrist.x - 0.5) * 5;
            targetRotX = (wrist.y - 0.5) * 3;
        }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 480, height: 640 // Resolución optimizada para iPhone (Portrait)
});
cameraUtils.start();

// --- BUCLE DE ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);
    
    if (particles) {
        // Suavizado (Lerp)
        currentScale += (targetScale - currentScale) * 0.1;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Rotación ultra fluida
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;
        
        // Giro constante de cortesía
        particles.rotation.y += 0.005;
        
        // Pulso suave
        const s = 1 + Math.sin(Date.now() * 0.002) * 0.03;
        particles.scale.multiplyScalar(s);
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
