<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Heart Experience - For Sofi</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #1a0a1a 0%, #000 100%); font-family: 'Inter', 'Segoe UI', sans-serif; }
        video { display: none; }
        
        #ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            background: rgba(255, 105, 180, 0.1);
            backdrop-filter: blur(10px);
            border-left: 3px solid #ff69b4;
            border-radius: 8px;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN DE ESCENA ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

let particles;
let targetScale = 1.2;
let currentScale = 1.2;
let targetRotX = 0;
let targetRotY = 0;
const lerpFactor = 0.05; // Fluidez ultra suave

// --- CREACIÓN DEL CORAZÓN ---
function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 4000;
    const positions = new Float32Array(count * 3);
    const sizes = new Float32Array(count);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        // Ecuación matemática pura del corazón
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 4; 

        positions[i * 3] = (x / 16);
        positions[i * 3 + 1] = (y / 16);
        positions[i * 3 + 2] = z / 16;
        sizes[i] = Math.random() * 2;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    // Material tipo "Glow"
    const material = new THREE.PointsMaterial({
        color: 0xff69b4,
        size: 0.025,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.6,
        depthWrite: false
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

createHeart();

// --- PROCESAMIENTO DE MANO (MEDIAPIPE) ---
const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.8,
    minTrackingConfidence: 0.8
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // Puntos clave
        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        const middleTip = landmarks[12];
        const ringTip = landmarks[16];
        const pinkyTip = landmarks[20];
        const wrist = landmarks[0];

        // 1. ESCALA (Distancia pulgar e índice)
        const dist = Math.sqrt(
            Math.pow(thumbTip.x - indexTip.x, 2) + 
            Math.pow(thumbTip.y - indexTip.y, 2)
        );
        targetScale = 0.6 + (dist * 8);

        // 2. GESTO DE ROTACIÓN (Solo índice arriba)
        // El índice debe estar arriba del nudillo, y los demás dedos abajo de sus nudillos
        const isIndexUp = indexTip.y < landmarks[6].y;
        const isMiddleDown = middleTip.y > landmarks[10].y;
        const isRingDown = ringTip.y > landmarks[14].y;
        const isPinkyDown = pinkyTip.y > landmarks[18].y;

        if (isIndexUp && isMiddleDown && isRingDown && isPinkyDown) {
            // Sensibilidad calibrada (8 para Y, 5 para X)
            targetRotY = (wrist.x - 0.5) * 8; 
            targetRotX = (wrist.y - 0.5) * 5;
        }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720
});
cameraUtils.start();

// --- RENDER LOOP ---
function animate() {
    requestAnimationFrame(animate);

    if (particles) {
        // Suavizado de Escala
        currentScale += (targetScale - currentScale) * lerpFactor;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Suavizado de Rotación
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;

        // Micro-movimiento orgánico (para que no parezca muerto)
        const time = Date.now() * 0.001;
        particles.position.y = Math.sin(time) * 0.05;
        
        // Brillo intermitente sutil
        particles.material.opacity = 0.5 + Math.sin(time * 2) * 0.1;
    }

    renderer.render(scene, camera);
}
animate();

// Ajuste dinámico de ventana
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
