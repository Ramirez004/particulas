<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Interactivo</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;}
#video-container{position:fixed;bottom:10px;left:10px;width:130px;
border:2px solid #ff0077;border-radius:10px;overflow:hidden;
transform:scaleX(-1);}
#video-container video{width:100%;}
.hud{position:fixed;top:20px;left:20px;color:white;
background:rgba(255,0,119,.15);padding:15px;border-radius:10px;}
</style>
</head>
<body>

<div class="hud">
<h3>Comandos</h3>
<p>• 2 Dedos</p>
<p>• 3 Dedos</p>
<p>• Mano Abierta</p>
<p>• Puño Cerrado</p>
</div>

<div id="video-container">
<video id="input_video" autoplay muted playsinline></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const COUNT=10000;
let scene,camera,renderer,particles;
let positions,targets;
let currentMode="";
let rotationSpeed=0;
let transitionLerp=.04;

function init(){
scene=new THREE.Scene();
camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.z=18;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const geo=new THREE.BufferGeometry();
positions=new Float32Array(COUNT*3);
targets=new Float32Array(COUNT*3);

for(let i=0;i<COUNT*3;i++){
positions[i]=(Math.random()-.5)*40;
targets[i]=positions[i];
}

geo.setAttribute("position",new THREE.BufferAttribute(positions,3));

const mat=new THREE.PointsMaterial({
size:.05,
color:0xff0077,
transparent:true,
opacity:.9,
blending:THREE.AdditiveBlending,
depthWrite:false
});

particles=new THREE.Points(geo,mat);
scene.add(particles);
}

function resetScene(){
particles.rotation.set(0,0,0);
rotationSpeed=0;
camera.position.z=18;
}

function setMode(mode){
if(currentMode===mode) return false;
currentMode=mode;
resetScene();
return true;
}

function createIdle(){
const changed=setMode("idle");
rotationSpeed=.001;
transitionLerp=.03;
particles.material.color.setHex(0xff0077);
if(!changed) return;
for(let i=0;i<COUNT*3;i++)
targets[i]=(Math.random()-.5)*40;
}

function createText(){
const changed=setMode("text");
rotationSpeed=.003;
transitionLerp=.08;
particles.material.color.setHex(0xff0077);
if(!changed) return;

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");
canvas.width=900;canvas.height=200;
ctx.fillStyle="white";
ctx.font="bold 80px Arial";
ctx.textAlign="center";
ctx.fillText("TE AMO SOFI",450,120);

const data=ctx.getImageData(0,0,900,200).data;
const pts=[];
for(let y=0;y<200;y+=4){
for(let x=0;x<900;x+=4){
if(data[(y*900+x)*4+3]>128)
pts.push({x:(x-450)/20,y:-(y-100)/20});
}}
for(let i=0;i<COUNT;i++){
const p=pts[i%pts.length];
const i3=i*3;
targets[i3]=p.x;
targets[i3+1]=p.y;
targets[i3+2]=(Math.random()-.5)*2;
}
}

function createSaturn(){
const changed=setMode("saturn");
rotationSpeed=.004;
transitionLerp=.035;
particles.material.color.setHex(0xffaa00);
if(!changed) return;

for(let i=0;i<COUNT;i++){
const i3=i*3;
if(i<COUNT*.5){
const u=Math.random();
const v=Math.random();
const theta=2*Math.PI*u;
const phi=Math.acos(2*v-1);
const r=4;
targets[i3]=r*Math.sin(phi)*Math.cos(theta);
targets[i3+1]=r*Math.sin(phi)*Math.sin(theta);
targets[i3+2]=r*Math.cos(phi);
}else{
const radius=6+Math.random()*2;
const a=Math.random()*Math.PI*2;
targets[i3]=radius*Math.cos(a);
targets[i3+1]=(Math.random()-.5)*.3;
targets[i3+2]=radius*Math.sin(a);
}
}
}

function createHeart(){
const changed=setMode("heart");
rotationSpeed=.002;
transitionLerp=.035;
particles.material.color.setHex(0xff0000);
if(!changed) return;

for(let i=0;i<COUNT;i++){
const i3=i*3;
const t=Math.random()*Math.PI*2;
const x=16*Math.pow(Math.sin(t),3);
const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
targets[i3]=x*.5;
targets[i3+1]=y*.5;
targets[i3+2]=0;
}
}

function createOpenField(){
const changed=setMode("open");
rotationSpeed=.001;
transitionLerp=.03;
particles.material.color.setHex(0x88ccff);
if(!changed) return;

for(let i=0;i<COUNT;i++){
const i3=i*3;

const angle=Math.random()*Math.PI*2;
const radius=5+Math.random()*10;

targets[i3]=Math.cos(angle)*radius;
targets[i3+1]=(Math.random()-.5)*6;
targets[i3+2]=Math.sin(angle)*radius;
}
}

// DETECCIÓN MÁS SIMPLE Y ESTABLE
function onResults(results){

if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){
createIdle();
return;
}

const h=results.multiHandLandmarks[0];

const indexUp=h[8].y<h[6].y;
const middleUp=h[12].y<h[10].y;
const ringUp=h[16].y<h[14].y;
const pinkyUp=h[20].y<h[18].y;

const count=[indexUp,middleUp,ringUp,pinkyUp].filter(Boolean).length;

// ORDEN CORRECTO
if(count===0){
createHeart();
}
else if(count===3){
createSaturn();
}
else if(count===2 && indexUp && middleUp){
createText();
}
else if(count===4){
createOpenField();
}
}

function animate(){
requestAnimationFrame(animate);

const pos=particles.geometry.attributes.position.array;
for(let i=0;i<COUNT*3;i++)
pos[i]+=(targets[i]-pos[i])*transitionLerp;

particles.rotation.y+=rotationSpeed;
particles.geometry.attributes.position.needsUpdate=true;

renderer.render(scene,camera);
}

const video=document.getElementById("input_video");
const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,
minDetectionConfidence:.75,minTrackingConfidence:.75});
hands.onResults(onResults);

new Camera(video,{
onFrame:async()=>{await hands.send({image:video});},
width:640,height:480
}).start();

init();
createIdle();
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
