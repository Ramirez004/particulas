<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Particles Gestures</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let mode = "idle";
let lastMode = "";

const PARTICLE_COUNT = 900;
const CENTER = {x: canvas.width/2, y: canvas.height/2};
const SPEED = 0.2;
const DAMPING = 0.94;
const DEPTH = 400;

class Particle{
    constructor(){
        this.reset();
    }
    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.z = Math.random()*DEPTH;
        this.vx = 0;
        this.vy = 0;
        this.vz = 0;
    }
    update(){
        this.vx *= DAMPING;
        this.vy *= DAMPING;
        this.vz *= DAMPING;

        this.x += this.vx;
        this.y += this.vy;
        this.z += this.vz;

        if(this.z < 1) this.z = DEPTH;
        if(this.z > DEPTH) this.z = 1;
    }
    draw(){
        const scale = DEPTH/(DEPTH+this.z);
        const x2d = (this.x - CENTER.x)*scale + CENTER.x;
        const y2d = (this.y - CENTER.y)*scale + CENTER.y;
        const size = scale*2;

        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(x2d,y2d,size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<PARTICLE_COUNT;i++){
    particles.push(new Particle());
}

function resetParticles(){
    particles.forEach(p=>p.reset());
}

function saturn(){
    const t = Date.now()*0.001;
    particles.forEach((p,i)=>{
        const angle = i*0.05 + t*0.5;
        const radius = 200;
        p.x = CENTER.x + Math.cos(angle)*radius;
        p.y = CENTER.y + Math.sin(angle)*radius*0.4;
        p.z = Math.sin(angle)*200;
    });
}

function heart(){
    let i=0;
    particles.forEach(p=>{
        const t = i*0.02;
        const x = 16*Math.pow(Math.sin(t),3);
        const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
        p.x = CENTER.x + x*15;
        p.y = CENTER.y - y*15;
        p.z = 100;
        i++;
    });
}

function victory3D(){
    particles.forEach(p=>{
        p.vx += (Math.random()-0.5)*SPEED;
        p.vy += (Math.random()-0.5)*SPEED;
        p.vz += (Math.random()-0.5)*SPEED;
    });
}

function openHand(){
    particles.forEach(p=>{
        const dx = p.x - CENTER.x;
        const dy = p.y - CENTER.y;
        const dist = Math.sqrt(dx*dx+dy*dy)+0.01;
        p.vx += dx/dist*0.3;
        p.vy += dy/dist*0.3;
    });

    ctx.fillStyle="white";
    ctx.font="bold 60px Arial";
    ctx.textAlign="center";
    ctx.fillText("TE AMO SOFI",CENTER.x,CENTER.y);
}

function idle(){
    particles.forEach(p=>{
        p.vz -= 0.3;
    });
}

function animate(){
    requestAnimationFrame(animate);
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(mode!==lastMode){
        resetParticles();
        lastMode=mode;
    }

    if(mode==="saturn") saturn();
    if(mode==="heart") heart();
    if(mode==="victory") victory3D();
    if(mode==="open") openHand();
    if(mode==="idle") idle();

    particles.forEach(p=>{
        p.update();
        p.draw();
    });
}

animate();

/* 
CAMBIA EL MODO MANUALMENTE PARA PROBAR:

mode="saturn";   // tres dedos
mode="heart";    // puño
mode="victory";  // dos dedos
mode="open";     // mano abierta
mode="idle";     // sin gesto

*/
</script>
</body>
</html>
