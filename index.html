<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universo para Sofia - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video-container { position: fixed; bottom: 15px; left: 15px; width: 140px; border: 2px solid #ff0077; border-radius: 10px; overflow: hidden; z-index: 100; transform: scaleX(-1); }
        #video-container video { width: 100%; display: block; }
        .hud { position: fixed; top: 20px; left: 20px; color: #ff0077; pointer-events: none; z-index: 10; text-shadow: 2px 2px 5px #000; }
        b { color: #fff; }
    </style>
</head>
<body>

<div class="hud">
    <h2 id="gesto-actual">Detectando...</h2>
    <p>✌️ 2 Dedos: <b>"TE AMO SOFIA"</b></p>
    <p>🤟 3 Dedos: <b>Saturno</b></p>
    <p>🖐️ Mano Abierta: <b>Corazón + Grande</b></p>
    <p>👌 Pellizco: <b>Atracción</b></p>
</div>

<div id="video-container"><video id="input_video"></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, particles;
const COUNT = 12000; 
let positions, targets;
let targetSize = 0.04;
const statusLabel = document.getElementById('gesto-actual');

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    positions = new Float32Array(COUNT * 3);
    targets = new Float32Array(COUNT * 3);

    for(let i=0; i<COUNT*3; i++) {
        positions[i] = (Math.random() - 0.5) * 40;
        targets[i] = positions[i];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ 
        size: 0.04, 
        color: 0xff0077, 
        transparent: true, 
        opacity: 0.8, 
        blending: THREE.AdditiveBlending 
    });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);

    camera.position.z = 15;
}

// --- GENERADORES DE FORMAS ---

function createHeart(hX, hY) {
    targetSize = 0.12; // Súper grande al abrir la mano
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const t = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()); // Relleno uniforme
        const x = 16 * Math.pow(Math.sin(t), 3) * r;
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
        targets[i3] = (x / 3.5) + hX;
        targets[i3+1] = (y / 3.5) + hY;
        targets[i3+2] = (Math.random() - 0.5) * 4;
    }
}

function createText() {
    targetSize = 0.04;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 200;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TE AMO SOFIA', 400, 100);
    
    const data = ctx.getImageData(0,0,800,200).data;
    const points = [];
    for(let y=0; y<200; y+=3) { // Salto de 3 para optimizar
        for(let x=0; x<800; x+=3) {
            if(data[(y*800 + x)*4 + 3] > 128) points.push({x: (x-400)/18, y: -(y-100)/18});
        }
    }
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const p = points[i % points.length];
        targets[i3] = p.x;
        targets[i3+1] = p.y;
        targets[i3+2] = (Math.random() - 0.5) * 2;
    }
}

function createSaturn() {
    targetSize = 0.05;
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        if (i < COUNT * 0.5) { // Planeta (Esfera)
            const u = Math.random(), v = Math.random();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            targets[i3] = 3 * Math.sin(phi) * Math.cos(theta);
            targets[i3+1] = 3 * Math.sin(phi) * Math.sin(theta);
            targets[i3+2] = 3 * Math.cos(phi);
        } else { // Anillo
            const r = 4.5 + Math.random() * 2.5;
            const a = Math.random() * Math.PI * 2;
            targets[i3] = r * Math.cos(a);
            targets[i3+1] = (r * Math.sin(a) * 0.4); 
            targets[i3+2] = (r * Math.sin(a) * 0.8);
        }
    }
}

function createPinch(hX, hY) {
    targetSize = 0.02;
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const radius = Math.random() * 2;
        const theta = Math.random() * Math.PI * 2;
        targets[i3] = hX + Math.cos(theta) * radius;
        targets[i3+1] = hY + Math.sin(theta) * radius;
        targets[i3+2] = (Math.random() - 0.5) * 10; // Efecto de dispersión en profundidad
    }
}

// --- LÓGICA DE DETECCIÓN MEJORADA ---

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        statusLabel.innerText = "Mueve tu mano";
        for(let i=0; i<COUNT*3; i+=3) {
            targets[i] += (Math.random() - 0.5) * 0.2; // Movimiento errante
        }
        return;
    }

    const hand = results.multiHandLandmarks[0];
    // Invertir X porque el video está en espejo
    const hX = -(hand[9].x - 0.5) * 30; 
    const hY = -(hand[9].y - 0.5) * 22;

    // Detectar qué dedos están extendidos
    const isIndexUp = hand[8].y < hand[6].y;
    const isMiddleUp = hand[12].y < hand[10].y;
    const isRingUp = hand[16].y < hand[14].y;
    const isPinkyUp = hand[20].y < hand[18].y;

    const countUp = [isIndexUp, isMiddleUp, isRingUp, isPinkyUp].filter(Boolean).length;
    const distPinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);

    if (distPinch < 0.05) {
        statusLabel.innerText = "Pellizco: Atracción";
        createPinch(hX, hY);
        particles.material.color.setHex(0x00ffff);
    } else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
        statusLabel.innerText = "✌️ TE AMO SOFIA";
        createText();
        particles.material.color.setHex(0xff0077);
    } else if (isIndexUp && isMiddleUp && isRingUp && !isPinkyUp) {
        statusLabel.innerText = "🤟 SATURNO";
        createSaturn();
        particles.material.color.setHex(0xffaa00);
    } else if (countUp >= 4) {
        statusLabel.innerText = "🖐️ CORAZÓN";
        createHeart(hX, hY);
        particles.material.color.setHex(0xff3333);
    } else {
        statusLabel.innerText = "Intenta un gesto";
    }
}

const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
hands.onResults(onResults);

new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 }).start();

init();

function animate() {
    requestAnimationFrame(animate);
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT * 3; i++) {
        // Velocidad suave: 0.08
        pos[i] += (targets[i] - pos[i]) * 0.08;
    }
    // Interpolación de tamaño
    particles.material.size += (targetSize - particles.material.size) * 0.1;
    
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.003; 
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
