<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Interactiva - Sofia</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #video-container { position: fixed; bottom: 15px; left: 15px; width: 130px; border: 1px solid #444; border-radius: 8px; overflow: hidden; z-index: 100; transform: scaleX(-1); }
        #video-container video { width: 100%; display: block; }
        .hud { position: fixed; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        .hud h3 { margin: 0 0 10px 0; color: #ff0077; }
    </style>
</head>
<body>

<div class="hud">
    <h3>Comandos:</h3>
    <p>• Ejemplo: 2 dedos</p>
    <p>• Ejemplo: 3 dedos</p>
    <p>• Ejemplo: Mano abierta</p>
    <p>• Ejemplo: Pellizco</p>
</div>

<div id="video-container"><video id="input_video"></video></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, particles;
const COUNT = 12000; 
let positions, targets;
let targetSize = 0.04;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const geo = new THREE.BufferGeometry();
    positions = new Float32Array(COUNT * 3);
    targets = new Float32Array(COUNT * 3);

    for(let i=0; i<COUNT*3; i++) {
        positions[i] = (Math.random() - 0.5) * 40;
        targets[i] = positions[i];
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({ 
        size: 0.04, 
        color: 0xff0077, 
        transparent: true, 
        opacity: 0.8, 
        blending: THREE.AdditiveBlending 
    });
    particles = new THREE.Points(geo, mat);
    scene.add(particles);
    camera.position.z = 15;
}

// --- GENERADORES ---

function createHeart(hX, hY) {
    targetSize = 0.15; // AGRANDAR partículas
    for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const t = Math.random() * Math.PI * 2;
        const r = Math.pow(Math.random(), 0.5); 
        const x = 16 * Math.pow(Math.sin(t), 3) * r;
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
        targets[i3] = (x / 3.5) + hX;
        targets[i3+1] = (y / 3.5) + hY;
        targets[i3+2] = (Math.random() - 0.5) * 3;
    }
}

function createSaturn() {
    targetSize = 0.05;
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        if (i < COUNT * 0.5) { // Planeta
            const u = Math.random(), v = Math.random();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            targets[i3] = 3.5 * Math.sin(phi) * Math.cos(theta);
            targets[i3+1] = 3.5 * Math.sin(phi) * Math.sin(theta);
            targets[i3+2] = 3.5 * Math.cos(phi);
        } else { // Anillo
            const r = 5.5 + Math.random() * 2.5;
            const a = Math.random() * Math.PI * 2;
            targets[i3] = r * Math.cos(a);
            targets[i3+1] = (r * Math.sin(a) * 0.4); 
            targets[i3+2] = (r * Math.sin(a) * 0.8);
        }
    }
}

function createText() {
    targetSize = 0.04;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 200;
    ctx.fillStyle = 'white';
    ctx.font = 'bold 75px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('TE AMO SOFIA', 400, 100);
    
    const data = ctx.getImageData(0,0,800,200).data;
    const points = [];
    for(let y=0; y<200; y+=3) {
        for(let x=0; x<800; x+=3) {
            if(data[(y*800 + x)*4 + 3] > 128) points.push({x: (x-400)/18, y: -(y-100)/18});
        }
    }
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const p = points[i % points.length];
        targets[i3] = p.x;
        targets[i3+1] = p.y;
        targets[i3+2] = (Math.random() - 0.5) * 2;
    }
}

function createPinch(hX, hY) {
    targetSize = 0.02;
    for(let i=0; i<COUNT; i++) {
        const i3 = i * 3;
        const radius = Math.random() * 2.5;
        const theta = Math.random() * Math.PI * 2;
        targets[i3] = hX + Math.cos(theta) * radius;
        targets[i3+1] = hY + Math.sin(theta) * radius;
        targets[i3+2] = (Math.random() - 0.5) * 12;
    }
}

function onResults(results) {
    if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
        for(let i=0; i<COUNT*3; i+=3) {
            targets[i] += (Math.random() - 0.5) * 0.1;
        }
        return;
    }

    const hand = results.multiHandLandmarks[0];
    const hX = -(hand[9].x - 0.5) * 30; 
    const hY = -(hand[9].y - 0.5) * 22;

    const isIndexUp = hand[8].y < hand[6].y;
    const isMiddleUp = hand[12].y < hand[10].y;
    const isRingUp = hand[16].y < hand[14].y;
    const isPinkyUp = hand[20].y < hand[18].y;

    const distPinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);

    // Prioridad de gestos inmediata
    if (distPinch < 0.05) {
        createPinch(hX, hY);
        particles.material.color.setHex(0x00ffff);
    } else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) {
        createText();
        particles.material.color.setHex(0xff0077);
    } else if (isIndexUp && isMiddleUp && isRingUp && !isPinkyUp) {
        createSaturn();
        particles.material.color.setHex(0xffaa00);
    } else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) {
        createHeart(hX, hY);
        particles.material.color.setHex(0xff3333);
    }
}

const videoElement = document.getElementById('input_video');
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
hands.onResults(onResults);

new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 }).start();

init();

function animate() {
    requestAnimationFrame(animate);
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < COUNT * 3; i++) {
        // Factor 0.1 para que se forme INSTANTÁNEAMENTE al reconocer el gesto
        pos[i] += (targets[i] - pos[i]) * 0.1;
    }
    particles.material.size += (targetSize - particles.material.size) * 0.1;
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += 0.002; 
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
