<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Heart for Sofi - Gesture Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        video { display: none; }
        #ui-overlay {
            position: absolute; bottom: 30px; left: 30px; color: white;
            font-size: 26px; font-weight: 300; letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,105,180,0.9); z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- ESCENA THREE JS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

let particles;
let targetScale = 1;
let currentScale = 1;
let targetRotX = 0;
let targetRotY = 0;
const lerpFactor = 0.07; // Control de fluidez (suavizado)

function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const count = 3500;
    const positions = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 5; 

        positions[i * 3] = (x / 16);
        positions[i * 3 + 1] = (y / 16);
        positions[i * 3 + 2] = z / 16;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({
        color: 0xff1493, size: 0.035, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.8
    });
    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}
createHeart();

// --- LÓGICA DE GESTOS ---
const videoElement = document.getElementById('video');
const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

hands.setOptions({
    maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // 1. Escala (Distancia Pulgar-Índice)
        const thumb = landmarks[4];
        const indexTip = landmarks[8];
        const dist = Math.sqrt(Math.pow(thumb.x - indexTip.x, 2) + Math.pow(thumb.y - indexTip.y, 2));
        targetScale = 0.8 + (dist * 6);

        // 2. Detección de "Dedo Índice Levantado" (Gesto de apuntar)
        // Verificamos que el índice esté más arriba que sus nudillos y los otros dedos cerrados
        const isIndexUp = indexTip.y < landmarks[6].y;
        const isMiddleDown = landmarks[12].y > landmarks[10].y;
        const isRingDown = landmarks[16].y > landmarks[14].y;
        const isPinkyDown = landmarks[20].y > landmarks[18].y;

        if (isIndexUp && isMiddleDown && isRingDown && isPinkyDown) {
            // Solo actualizamos la rotación si el gesto es correcto
            const palm = landmarks[0];
            // SENSIBILIDAD: Aquí puedes subir los números (5 y 4) para rotar más rápido
            targetRotY = (palm.x - 0.5) * 5; 
            targetRotX = (palm.y - 0.5) * 4;
        }
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({ image: videoElement }); },
    width: 1280, height: 720
});
cameraUtils.start();

// --- ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);
    if (particles) {
        // Suavizado de escala
        currentScale += (targetScale - currentScale) * lerpFactor;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Suavizado de rotación (Interpolación lineal hacia el objetivo)
        particles.rotation.y += (targetRotY - particles.rotation.y) * lerpFactor;
        particles.rotation.x += (targetRotX - particles.rotation.x) * lerpFactor;
        
        // Latido muy sutil para que no parezca una foto estática al inicio
        const pulse = Math.sin(Date.now() * 0.002) * 0.002;
        particles.scale.addScalar(pulse);
    }
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
