<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D Heart for Sofi</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        video { display: none; }
        
        #ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,105,180,0.8);
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui-overlay">Hola Sofi</div>
<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// --- CONFIGURACIÓN THREE JS ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

let particles;
let particleCount = 3000;
let targetScale = 1;
let currentScale = 1;
const lerpFactor = 0.1; // Controla la fluidez (0.1 = suave, 1.0 = instantáneo)

function createHeart() {
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
        const t = Math.random() * Math.PI * 2;
        // Ecuación paramétrica del corazón
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        let z = (Math.random() - 0.5) * 5; 

        // Esparcir un poco los puntos para que se vea 3D
        positions[i * 3] = (x / 16) + (Math.random() - 0.5) * 0.2;
        positions[i * 3 + 1] = (y / 16) + (Math.random() - 0.5) * 0.2;
        positions[i * 3 + 2] = z / 16;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.PointsMaterial({
        color: 0xff69b4,
        size: 0.04,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.8
    });

    particles = new THREE.Points(geometry, material);
    scene.add(particles);
}

createHeart();

// --- CONFIGURACIÓN MEDIAPIPE ---
const videoElement = document.getElementById('video');
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6
});

hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const thumb = landmarks[4];
        const index = landmarks[8];

        // Cálculo de distancia entre pulgar e índice
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        // Sensibilidad equilibrada: mapeamos la distancia a escala
        // Si distance es 0.05 (mano cerrada) -> escala 0.8
        // Si distance es 0.3 (mano abierta) -> escala 2.5
        targetScale = 0.8 + (distance * 6);
        
        // Cambio de color suave basado en la apertura
        particles.material.color.setHSL(0.9, 0.8, 0.5 + (distance * 0.5));
    }
});

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({ image: videoElement });
    },
    width: 640,
    height: 480
});
cameraUtils.start();

// --- LOOP DE ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);

    if (particles) {
        // Fluidez: Lerp para la escala
        currentScale += (targetScale - currentScale) * lerpFactor;
        particles.scale.set(currentScale, currentScale, currentScale);

        // Rotación suave
        particles.rotation.y += 0.01;
        
        // Efecto "latido" sutil adicional
        const pulse = Math.sin(Date.now() * 0.005) * 0.05;
        particles.scale.addScalar(pulse);
    }

    renderer.render(scene, camera);
}
animate();

// Ajuste de pantalla
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
